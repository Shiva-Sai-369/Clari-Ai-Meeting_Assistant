<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clari</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        width: 300px;
        min-height: 200px;
        background: #111827;
        color: #f9fafb;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 13px;
      }

      .header {
        background: linear-gradient(135deg, #7c3aed, #4f46e5);
        padding: 14px 16px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .logo { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
      .tagline { font-size: 11px; opacity: 0.85; margin-top: 1px; }

      .body { padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }

      .status-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        background: #1f2937;
        border-radius: 10px;
      }
      .dot {
        width: 10px; height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .dot.active { background: #10b981; animation: pulse 1.5s infinite; }
      .dot.inactive { background: #6b7280; }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

      .status-label { font-weight: 600; font-size: 13px; }
      .platform-badge {
        margin-left: auto;
        font-size: 10px;
        padding: 2px 7px;
        border-radius: 99px;
        background: #374151;
        color: #9ca3af;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .stats {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .stat {
        background: #1f2937;
        border-radius: 10px;
        padding: 10px 12px;
      }
      .stat-value { font-size: 20px; font-weight: 700; color: #a78bfa; }
      .stat-label { font-size: 11px; color: #6b7280; margin-top: 2px; }

      .last-updated {
        font-size: 11px;
        color: #6b7280;
        text-align: center;
      }

      .actions { display: flex; flex-direction: column; gap: 8px; }

      button {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.15s;
      }
      button:hover { opacity: 0.88; }
      button:active { opacity: 0.75; }

      .btn-primary {
        background: linear-gradient(135deg, #7c3aed, #4f46e5);
        color: #fff;
      }
      .btn-secondary {
        background: #1f2937;
        color: #d1d5db;
        border: 1px solid #374151;
      }
      .btn-danger {
        background: #1f2937;
        color: #f87171;
        border: 1px solid #374151;
      }

      .no-meeting {
        text-align: center;
        padding: 20px 0 8px;
        color: #6b7280;
        font-size: 12px;
        line-height: 1.6;
      }
      .no-meeting strong { display: block; font-size: 14px; color: #9ca3af; margin-bottom: 6px; }

      .copied {
        text-align: center;
        color: #10b981;
        font-size: 12px;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div>
        <div class="logo">⚡ Clari</div>
        <div class="tagline">AI Meeting Assistant</div>
      </div>
    </div>

    <div class="body">
      <div id="app-content">
        <!-- Rendered by popup.js -->
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
